<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — CiudadConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f5f7fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-login {
            width: 100%;
            max-width: 420px;
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        .brand-header {
            background-color: #1a3c5e;
            border-radius: 16px 16px 0 0;
            padding: 30px;
            text-align: center;
            color: white;
        }
        .password-wrapper {
            position: relative;
        }
        .password-wrapper .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #6c757d;
            cursor: pointer;
            padding: 4px 8px;
        }
        .password-wrapper .toggle-password:hover {
            color: #1a3c5e;
        }
        .password-wrapper input {
            padding-right: 40px;
        }
    </style>
</head>
<body>
    <div class="card-login">
        <div class="brand-header">
            <i class="bi bi-geo-alt-fill fs-2"></i>
            <h4 class="fw-bold mt-2 mb-0">CiudadConnect</h4>
            <p class="mb-0 opacity-75 small">Plataforma ciudadana de incidencias</p>
        </div>
        <div class="card-body p-4">
            <h5 class="fw-bold mb-4">Iniciar sesión</h5>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger small">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-semibold small">Correo electrónico</label>
                    {{ form.username }}
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold small">Contraseña</label>
                    <div class="password-wrapper">
                        {{ form.password }}
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility(this)" title="Mostrar/ocultar">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
                </button>
            </form>

            <hr class="my-4">
            <p class="text-center text-muted small mb-0">
                ¿No tienes cuenta?
                <a href="{% url 'registro' %}" class="text-primary fw-semibold">Regístrate aquí</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function togglePasswordVisibility(button) {
            const input = button.parentElement.querySelector('input');
            const icon = button.querySelector('i');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
            }
        }
    </script>
</body>
</html>
